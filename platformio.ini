[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
  gin66/FastAccelStepper @ ^0.30.15
  waspinator/AccelStepper @ ^1.64
; HID シャッターは lib/HidShutter に自作（既存サーバーへ同居させるため）。
; t-vk/ESP32 BLE Keyboard は createServer を二重に呼び、モーター用の
; GATT サーバーを孤児化させるので使わない（BLEDevice.cpp 実装で確認済み）。

[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D MOTOR_BOARD_XIAO_ESP32S3
  -D MOTOR_PIN_DIR=D8
  -D MOTOR_PIN_STEP=D9
  -D MOTOR_PIN_MS1=D0
  -D MOTOR_PIN_MS2=D1
  -D MOTOR_PIN_MS3=D2
  -D MOTOR_PIN_EN=D3

[env:esp32dev]
board = esp32dev
build_flags =
  -D MOTOR_BOARD_ESP32DEV
  -D MOTOR_PIN_DIR=26
  -D MOTOR_PIN_STEP=25
  -D MOTOR_PIN_MS1=14
  -D MOTOR_PIN_MS2=27
  -D MOTOR_PIN_MS3=33
  -D MOTOR_PIN_EN=32
